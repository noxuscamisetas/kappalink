<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dra. Adriana | Consulta</title>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #f5f3ff;
      --primary-soft: #ede9fe;
      --bg: #faf9ff;
      --card: #ffffff;
      --text: #1e1b2e;
      --muted: #8b8599;
      --line: #e9e4f5;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    /* HEADER */
    .header-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(124,58,237,.08);
    }

    .header-bg {
      height: 64px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
    }

    .header-content {
      padding: 0 20px 20px;
      margin-top: -32px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border: 3px solid white;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(124,58,237,.25);
    }

    .header-content h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .header-content p {
      font-size: 13px;
      color: var(--muted);
    }

    /* CONVERSA */
    .conv-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(124,58,237,.06);
      min-height: 280px;
      overflow-y: auto;
    }

    .conv-bubble {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 14px;
      animation: bubbleIn .35s ease;
    }

    .conv-left {
      background: var(--primary-light);
      color: var(--text);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      font-weight: 700;
    }

    .conv-right {
      background: linear-gradient(135deg, var(--primary), #a855f7);
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      font-weight: 700;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* TYPING */
    .typing {
      display: flex;
      gap: 4px;
      align-self: flex-start;
      background: var(--primary-light);
      padding: 14px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      opacity: .4;
      animation: typingBounce 1.2s infinite ease;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* CHIPS */
    .conv-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      align-self: flex-start;
      max-width: 85%;
    }

    .conv-chip {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      border-radius: 999px;
      border: 2px solid var(--primary-soft);
      background: white;
      cursor: pointer;
      transition: .2s ease;
      color: var(--text);
    }

    .conv-chip:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .conv-chip.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    /* FOOTER */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 14px;
      opacity: .6;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header-card">
      <div class="header-bg"></div>
      <div class="header-content">
        <div class="avatar">A</div>
        <h1>Dra. Adriana</h1>
        <p>Psicóloga • Atendimento online e presencial</p>
      </div>
    </div>

    <div class="conv-wrap" id="convWrap"></div>

    <p class="footer-note">feito com KappaLink</p>

  </div>

  <script>
    const perguntas = [
      {
        texto: "Como posso te ajudar?",
        opcoes: ["Primeira consulta", "Continuar acompanhamento", "Só quero entender melhor"]
      },
      {
        texto: "Como prefere o atendimento?",
        opcoes: ["Online", "Presencial", "Sem preferência"]
      },
      {
        texto: "Qual sua disponibilidade?",
        opcoes: ["Manhã", "Tarde", "Noite", "Flexível"]
      },
      {
        texto: "É a primeira vez que busca acompanhamento?",
        opcoes: ["Sim", "Não", "Prefiro não dizer"]
      }
    ];

    const wrap = document.getElementById("convWrap");
    let etapa = 0;

    function mostrarTyping(callback) {
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";
      wrap.appendChild(typing);
      wrap.scrollTop = wrap.scrollHeight;
      setTimeout(() => {
        typing.remove();
        callback();
      }, 700);
    }

    function mostrarPergunta() {
      if (etapa >= perguntas.length) {
        mostrarTyping(() => {
          const fim = document.createElement("div");
          fim.className = "conv-bubble conv-left";
          fim.textContent = "Perfeito! Em breve entro em contato. Obrigada! 💜";
          wrap.appendChild(fim);
          wrap.scrollTop = wrap.scrollHeight;
        });
        return;
      }

      mostrarTyping(() => {
        const p = perguntas[etapa];

        const bubble = document.createElement("div");
        bubble.className = "conv-bubble conv-left";
        bubble.textContent = p.texto;
        wrap.appendChild(bubble);

        const chips = document.createElement("div");
        chips.className = "conv-chips";
        p.opcoes.forEach(op => {
          const chip = document.createElement("button");
          chip.className = "conv-chip";
          chip.textContent = op;
          chip.onclick = () => selecionar(op, chips);
          chips.appendChild(chip);
        });
        wrap.appendChild(chips);
        wrap.scrollTop = wrap.scrollHeight;
      });
    }

    function selecionar(valor, chipsEl) {
      chipsEl.querySelectorAll(".conv-chip").forEach(c => {
        c.disabled = true;
        c.classList.toggle("selected", c.textContent === valor);
      });

      const resposta = document.createElement("div");
      resposta.className = "conv-bubble conv-right";
      resposta.textContent = valor;
      wrap.appendChild(resposta);
      wrap.scrollTop = wrap.scrollHeight;

      etapa++;
      setTimeout(mostrarPergunta, 400);
    }

    mostrarPergunta();
  </script>
</body>
</html>
